<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Симуляция</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* --- Экран Загрузки --- */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out;
        }

        #boot-logo {
            width: 140px;
            height: 140px;
            object-fit: contain;
            color: white;
            text-align: center;
        }

        .loader {
            margin-top: 50px;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #0078d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Рабочий Стол --- */
        #desktop {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=1920') no-repeat center center;
            background-size: cover;
            display: none;
        }

        .shortcuts-grid {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .desktop-shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 85px;
            height: 85px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .desktop-shortcut:hover {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
        }

        .desktop-shortcut img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-bottom: 6px;
        }

        .desktop-shortcut span {
            color: #ffffff;
            font-size: 12px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        /* --- Окна Приложений --- */
        .window {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
            min-width: 300px;
            min-height: 200px;
        }

        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(243, 243, 243, 0.9);
            padding: 10px 14px;
            cursor: move;
        }

        .window-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #202020;
            font-weight: 500;
        }

        .window-title img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .window-controls {
            display: flex;
            gap: 4px;
        }

        .control-btn {
            width: 28px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #333;
            border-radius: 3px;
            cursor: pointer;
        }

        .control-btn:hover { background: rgba(0, 0, 0, 0.08); }
        .control-btn.close-btn:hover { background: #e81123; color: white; }

        .window-content {
            flex: 1;
            background: #ffffff;
            position: relative;
        }

        #browser-window { width: 850px; height: 580px; top: 5%; left: 15%; }
        #calc-window { width: 320px; height: 460px; top: 15%; left: 45%; }

        /* --- Браузер --- */
        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .browser-navbar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f3f3f3;
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .browser-btn {
            background: none;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
        }
        .browser-btn:hover { background: rgba(0,0,0,0.05); }

        .browser-address {
            flex: 1;
            padding: 6px 14px;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            user-select: text;
        }

        .browser-frame {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: #fff;
        }

        /* --- Калькулятор --- */
        .calc-container {
            padding: 15px;
            height: 100%;
            background: #f3f3f3;
            display: flex;
            flex-direction: column;
        }

        #calc-screen {
            width: 100%;
            height: 60px;
            background: transparent;
            border: none;
            font-size: 32px;
            text-align: right;
            padding: 10px;
            margin-bottom: 15px;
            outline: none;
            color: #111;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            flex: 1;
        }

        .calc-btn {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
        }

        .calc-btn:hover { background: #f9f9f9; }
        .calc-btn.op-btn { background: #f3f3f3; font-weight: bold; }
        .calc-btn.eq-btn { background: #0078d4; color: white; border: none; }

        /* --- Панель задач --- */
        .taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background: rgba(243, 243, 243, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .taskbar-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .taskbar-item {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            cursor: pointer;
        }

        .taskbar-item:hover { background: rgba(255, 255, 255, 0.6); }
        .taskbar-item img { width: 28px; height: 28px; object-fit: contain; }

        .taskbar-right {
            position: absolute;
            right: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 12px;
            color: #202020;
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <img id="boot-logo" src="i.webp" alt="Windows 11">
        <div class="loader"></div>
    </div>

    <div id="desktop">
        
        <div class="shortcuts-grid">
            <div class="desktop-shortcut" onclick="openWindow('browser-window')">
                <img src="i.jpg" alt="🌐">
                <span>Браузер</span>
            </div>
            <div class="desktop-shortcut" onclick="openWindow('calc-window')">
                <img src="i (1).webp" alt="🧮">
                <span>Калькулятор</span>
            </div>
        </div>

        <div id="browser-window" class="window" onmousedown="bringToFront(this)">
            <div class="window-header">
                <div class="window-title">
                    <img src="i.jpg" alt="🌐">
                    <span>Microsoft Edge</span>
                </div>
                <div class="window-controls">
                    <div class="control-btn" onclick="closeWindow('browser-window')">✕</div>
                </div>
            </div>
            <div class="window-content">
                <div class="browser-container">
                    <div class="browser-navbar">
                        <button class="browser-btn" onclick="reloadIframe()">🔄</button>
                        <input type="text" id="browser-url" class="browser-address" value="https://www.wikipedia.org">
                        <button class="browser-btn" onclick="openExternalTab()">↗️ Вкладка</button>
                    </div>
                    <iframe id="browser-iframe" class="browser-frame" src="https://www.wikipedia.org"></iframe>
                </div>
            </div>
        </div>

        <div id="calc-window" class="window" onmousedown="bringToFront(this)">
            <div class="window-header">
                <div class="window-title">
                    <img src="i (1).webp" alt="🧮">
                    <span>Калькулятор</span>
                </div>
                <div class="window-controls">
                    <div class="control-btn" onclick="closeWindow('calc-window')">✕</div>
                </div>
            </div>
            <div class="window-content">
                <div class="calc-container">
                    <input type="text" id="calc-screen" value="0" readonly>
                    <div class="calc-grid">
                        <button class="calc-btn op-btn" onclick="clearCalc()">C</button>
                        <button class="calc-btn op-btn" onclick="pressCalc('/')">/</button>
                        <button class="calc-btn op-btn" onclick="pressCalc('*')">*</button>
                        <button class="calc-btn op-btn" onclick="pressCalc('-')">-</button>
                        
                        <button class="calc-btn" onclick="pressCalc('7')">7</button>
                        <button class="calc-btn" onclick="pressCalc('8')">8</button>
                        <button class="calc-btn" onclick="pressCalc('9')">9</button>
                        <button class="calc-btn op-btn" onclick="pressCalc('+')">+</button>
                        
                        <button class="calc-btn" onclick="pressCalc('4')">4</button>
                        <button class="calc-btn" onclick="pressCalc('5')">5</button>
                        <button class="calc-btn" onclick="pressCalc('6')">6</button>
                        <button class="calc-btn eq-btn" style="grid-row: span 3;" onclick="calculateResult()">=</button>
                        
                        <button class="calc-btn" onclick="pressCalc('1')">1</button>
                        <button class="calc-btn" onclick="pressCalc('2')">2</button>
                        <button class="calc-btn" onclick="pressCalc('3')">3</button>
                        
                        <button class="calc-btn" style="grid-column: span 2;" onclick="pressCalc('0')">0</button>
                        <button class="calc-btn" onclick="pressCalc('.')">.</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="taskbar">
            <div class="taskbar-icons">
                <div class="taskbar-item"><img src="i.webp" alt="⊞"></div>
                <div class="taskbar-item" onclick="openWindow('browser-window')">
