<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Симуляция</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* --- Экран Загрузки --- */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        #boot-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .loader {
            margin-top: 40px;
            width: 36px;
            height: 36px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #0078d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Рабочий Стол --- */
        #desktop {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=1920') no-repeat center center;
            background-size: cover;
            display: none;
        }

        .shortcuts-grid {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .desktop-shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 90px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .desktop-shortcut:hover {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
        }

        .desktop-shortcut img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .desktop-shortcut span {
            color: #ffffff;
            font-size: 12px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        /* --- Окна --- */
        .window {
            position: absolute;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }

        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(243, 243, 243, 0.95);
            padding: 10px 14px;
            cursor: move;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .window-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #202020;
        }

        .window-title img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .window-controls {
            display: flex;
            gap: 4px;
        }

        .control-btn {
            width: 28px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #333;
            border-radius: 3px;
            cursor: pointer;
        }

        .control-btn:hover { background: rgba(0, 0, 0, 0.08); }
        .control-btn.close-btn:hover { background: #e81123; color: white; }

        .window-content {
            flex: 1;
            background: #ffffff;
            position: relative;
        }

        #browser-window { width: 850px; height: 580px; top: 8%; left: 15%; }
        #calc-window { width: 320px; height: 460px; top: 15%; left: 45%; }

        /* --- Браузер --- */
        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .browser-navbar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f3f3f3;
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .browser-btn {
            background: none;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
        }
        .browser-btn:hover { background: rgba(0,0,0,0.05); }

        .browser-address {
            flex: 1;
            padding: 6px 14px;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
        }

        .browser-frame {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: #fff;
        }

        /* --- Калькулятор --- */
        .calc-container {
            padding: 15px;
            height: 100%;
            background: #f3f3f3;
            display: flex;
            flex-direction: column;
        }

        #calc-screen {
            width: 100%;
            height: 60px;
            background: transparent;
            border: none;
            font-size: 32px;
            text-align: right;
            padding: 10px;
            margin-bottom: 15px;
            outline: none;
            color: #111;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            flex: 1;
        }

        .calc-btn {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
        }

        .calc-btn:hover { background: #f9f9f9; }
        .calc-btn.op-btn { background: #f3f3f3; font-weight: bold; }
        .calc-btn.eq-btn { background: #0078d4; color: white; border: none; }

        /* --- Панель задач --- */
        .taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background: rgba(243, 243, 243, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .taskbar-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .taskbar-item {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            cursor: pointer;
        }

        .taskbar-item:hover { background: rgba(255, 255, 255, 0.6); }
        .taskbar-item img { width: 28px; height: 28px; object-fit: contain; }

        .taskbar-right {
            position: absolute;
            right: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 12px;
            color: #202020;
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <img id="boot-logo" src="https://upload.wikimedia.org/wikipedia/commons/8/87/Windows_logo_-_2021.svg" alt="Windows 11">
        <div class="loader"></div>
    </div>

    <div id="desktop">
        
        <div class="shortcuts-grid">
            <div class="desktop-shortcut" onclick="openWindow('browser-window')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/Microsoft_Edge_logo_%20%282019%29.svg" alt="Edge">
                <span>Браузер</span>
            </div>
            <div class="desktop-shortcut" onclick="openWindow('calc-window')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Windows_Calculator_icon.png" alt="Calc">
                <span>Калькулятор</span>
            </div>
        </div>

        <div id="browser-window" class="window" onmousedown="bringToFront(this)">
            <div class="window-header">
                <div class="window-title">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/Microsoft_Edge_logo_%20%282019%29.svg" alt="">
                    <span>Microsoft Edge</span>
                </div>
                <div class="window-controls">
                    <div class="control-btn close-btn" onclick="closeWindow('browser-window')">✕</div>
                </div>
            </div>
            <div class="window-content">
                <div class="browser-container">
                    <div class="browser-navbar">
                        <button class="browser-btn" onclick="reloadIframe()">🔄</button>
                        <input type="text" id="browser-url" class="browser-address" value="https://www.wikipedia.org">
                        <button class="browser-btn" onclick="openExternalTab()">↗️ Вкладка</button>
                    </div>
                    <iframe id="browser-iframe" class="browser-frame" src="https://www.wikipedia.org"></iframe>
                </div>
            </div>
        </div>

        <div id="calc-window" class="window" onmousedown="bringToFront(this)">
            <div class="window-header">
                <div class="window-title">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Windows_Calculator_icon.png" alt="">
                    <span>Калькулятор</span>
                </div>
                <div class="window-controls">
                    <div class="control-btn close-btn" onclick="closeWindow('calc-window')">✕</div>
                </div>
            </div>
            <div class="window-content">
                <div class="calc-container">
                    <input type="text" id="calc-screen" value="0" readonly>
                    <div class="calc-grid">
                        <button class="calc-btn op-btn" onclick="clearCalc()">C</button>
                        <button class="calc-btn op-btn" onclick="pressCalc('/')">/</button>
                        <button class="calc-btn op-btn" onclick="pressCalc('*')">*</button>
                        <button class="calc-btn op-btn" onclick="pressCalc('-')">-</button>
                        
                        <button class="calc-btn" onclick="pressCalc('7')">7</button>
                        <button class="calc-btn" onclick="pressCalc('8')">8</button>
                        <button class="calc-btn" onclick="pressCalc('9')">9</button>
                        <button class="calc-btn op-btn" onclick="pressCalc('+')">+</button>
                        
                        <button class="calc-btn" onclick="pressCalc('4')">4</button>
                        <button class="calc-btn" onclick="pressCalc('5')">5</button>
                        <button class="calc-btn" onclick="pressCalc('6')">6</button>
                        <button class="calc-btn eq-btn" style="grid-row: span 3;" onclick="calculateResult()">=</button>
                        
                        <button class="calc-btn" onclick="pressCalc('1')">1</button>
                        <button class="calc-btn" onclick="pressCalc('2')">2</button>
                        <button class="calc-btn" onclick="pressCalc('3')">3</button>
                        
                        <button class="calc-btn" style="grid-column: span 2;" onclick="pressCalc('0')">0</button>
                        <button class="calc-btn" onclick="pressCalc('.')">.</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="taskbar">
            <div class="taskbar-icons">
                <div class="taskbar-item"><img src="https://upload.wikimedia.org/wikipedia/commons/8/87/Windows_logo_-_2021.svg" alt="⊞"></div>
                <div class="taskbar-item" onclick="openWindow('browser-window')"><img src="https://upload.wikimedia.org/wikipedia/commons/9/98/Microsoft_Edge_logo_%20%282019%29.svg" alt=""></div>
                <div class="taskbar-item" onclick="openWindow('calc-window')"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Windows_Calculator_icon.png" alt=""></div>
            </div>
            <div class="taskbar-right">
                <div id="current-time">12:00</div>
                <div id="current-date">01.01.2026</div>
            </div>
        </div>

    </div>

    <script>
        // Код инициализации БЕЗ искусственных ожиданий загрузки картинок
        document.addEventListener('DOMContentLoaded', () => {
            // Система гарантированно откроется ровно через 2 секунды
            setTimeout(() => {
                const bootScreen = document.getElementById('boot-screen');
                const desktop = document.getElementById('desktop');
                if (bootScreen && desktop) {
                    bootScreen.style.opacity = '0';
                    setTimeout(() => {
                        bootScreen.style.display = 'none';
                        desktop.style.display = 'block';
                    }, 400);
                }
            }, 2000);

            updateClock();
            setInterval(updateClock, 1000);
            document.querySelectorAll('.window').forEach(win => makeDraggable(win));

            const urlInput = document.getElementById('browser-url');
            if (urlInput) {
                urlInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        let url = urlInput.value.trim();
                        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
                        urlInput.value = url;
                        document.getElementById('browser-iframe').src = url;
                    }
                });
            }
        });

        function updateClock() {
            const now = new Date();
            const timeEl = document.getElementById('current-time');
            const dateEl = document.getElementById('current-date');
            if (timeEl) timeEl.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if (dateEl) dateEl.textContent = now.toLocaleDateString();
        }

        function reloadIframe() {
            const iframe = document.getElementById('browser-iframe');
            if (iframe) iframe.src = iframe.src;
        }

        function openExternalTab() {
            const url = document.getElementById('browser-url').value;
            window.open(url, '_blank');
        }

        let zIndexCounter = 10;
        function openWindow(id) {
            const win = document.getElementById(id);
            if (win) {
                win.style.display = 'flex';
                bringToFront(win);
            }
        }
        function closeWindow(id) {
            const win = document.getElementById(id);
            if (win) win.style.display = 'none';
        }
        function bringToFront(windowEl) { windowEl.style.zIndex = ++zIndexCounter; }

        function makeDraggable(windowEl) {
            const header = windowEl.querySelector('.window-header');
            let posX = 0, posY = 0, mouseX = 0, mouseY = 0;
            if (!header) return;
            header.onmousedown = (e) => {
                if (e.target.classList.contains('control-btn')) return;
                e.preventDefault();
                mouseX = e.clientX; mouseY = e.clientY;
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
                document.onmousemove = (ev) => {
                    ev.preventDefault();
                    posX = mouseX - ev.clientX; posY = mouseY - ev.clientY;
                    mouseX = ev.clientX; mouseY = ev.clientY;
                    windowEl.style.top = (windowEl.offsetTop - posY) + "px";
                    windowEl.style.left = (windowEl.offsetLeft - posX) + "px";
                };
            };
        }

        let calcExpression = "";
        const screen = document.getElementById('calc-screen');
        function pressCalc(val) {
            if (!screen) return;
            if (screen.value === "0" && !isNaN(val)) calcExpression = val;
            else calcExpression += val;
            screen.value = calcExpression;
        }
        function clearCalc() { calcExpression = ""; if (screen) screen.value = "0"; }
        function calculateResult() {
            if (!screen) return;
            try {
                let result = eval(calcExpression);
                screen.value = result;
                calcExpression = result.toString();
            } catch { screen.value = "Ошибка"; calcExpression = ""; }
        }
    </script>
</body>
</html>
