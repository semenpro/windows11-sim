<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Симуляция</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* --- Экран Загрузки --- */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        #boot-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .loader {
            margin-top: 40px;
            width: 36px;
            height: 36px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #0078d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Рабочий Стол --- */
        #desktop {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1620121692029-d088224ddc74?q=80&w=1920') no-repeat center center;
            background-size: cover;
            display: none;
        }

        .shortcuts-grid {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .desktop-shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 90px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .desktop-shortcut:hover {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
        }

        .desktop-shortcut img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .desktop-shortcut span {
            color: #ffffff;
            font-size: 12px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        /* --- Окна --- */
        .window {
            position: absolute;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }

        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(243, 243, 243, 0.95);
            padding: 10px 14px;
            cursor: move;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .window-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #202020;
        }

        .window-title img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .window-controls {
            display: flex;
            gap: 4px;
        }

        .control-btn {
            width: 28px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #333;
            border-radius: 3px;
            cursor: pointer;
        }

        .control-btn:hover { background: rgba(0, 0, 0, 0.08); }
        .control-btn.close-btn:hover { background: #e81123; color: white; }

        .window-content {
            flex: 1;
            background: #ffffff;
            position: relative;
        }

        #browser-window { width: 850px; height: 580px; top: 8%; left: 15%; }
        #calc-window { width: 320px; height: 460px; top: 15%; left: 45%; }

        /* --- Браузер --- */
        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
